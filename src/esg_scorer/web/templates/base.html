<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Chấm điểm ESG Số hóa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>

<body class="text-slate-800 antialiased min-h-screen flex flex-col">

    <!-- Navbar -->
    <nav class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <a href="/" class="flex items-center gap-3 hover:opacity-80 transition-opacity">
                    <div class="bg-emerald-500 text-white p-2 rounded-lg">
                        <i class="fa-solid fa-leaf text-xl"></i>
                    </div>
                    <span class="font-bold text-xl tracking-tight text-slate-800">ESG<span
                            class="text-emerald-500">Scorer</span></span>
                </a>
                <div class="flex items-center space-x-6">
                    <a href="/" class="text-slate-600 hover:text-emerald-500 font-medium transition-colors">Bảng xếp
                        hạng</a>
                    <a href="/upload"
                        class="bg-slate-900 text-white px-4 py-2 rounded-full text-sm font-medium hover:bg-slate-800 transition-colors shadow-sm">
                        <i class="fa-solid fa-cloud-arrow-up mr-2"></i>Chấm điểm ngay
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-slate-50 border-t border-slate-200 py-8 mt-auto">
        <div class="max-w-7xl mx-auto px-4 text-center text-slate-500 text-sm">
            <p>&copy; 2026 ESG Scorer. Hệ thống tự động phân tích và chấm điểm ESG doanh nghiệp Việt Nam.</p>
            <p class="mt-2 text-xs">Phát triển dựa trên khung KLD ESG Framework.</p>
        </div>
    </footer>

    {% block scripts %}{% endblock %}
</body>

</html>
